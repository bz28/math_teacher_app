services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mathapp
      POSTGRES_PASSWORD: mathapp
      POSTGRES_DB: mathapp
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mathapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://mathapp:mathapp@db:5432/mathapp
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ..:/app

volumes:
  postgres-data:
