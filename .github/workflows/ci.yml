name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mathapp
          POSTGRES_PASSWORD: mathapp
          POSTGRES_DB: mathapp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check api/ tests/

      - name: Type check
        run: mypy api/ --ignore-missing-imports

      - name: Test
        env:
          DATABASE_URL: postgresql+asyncpg://mathapp:mathapp@localhost:5432/mathapp_test
          JWT_SECRET: ci-test-secret
          CLAUDE_API_KEY: sk-ant-ci-fake-key
          APP_ENV: test
          SENTRY_DSN: ""
        run: pytest tests/ -v -m "not integration"

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Type check
        working-directory: mobile
        run: npx tsc --noEmit

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: web
        run: pnpm lint

      - name: Build
        working-directory: web
        run: pnpm build
